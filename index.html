<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dev-apps Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  h1 { font-size: 1.6rem; margin-bottom: 8px; }
  .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 0.9rem; }
  .stats-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; min-width: 140px; }
  .stat-value { font-size: 1.8rem; font-weight: 700; }
  .stat-label { color: var(--muted); font-size: 0.8rem; }
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .search { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; width: 300px; font-size: 0.85rem; margin-bottom: 16px; }
  .search::placeholder { color: var(--muted); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 12px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: border-color 0.2s; }
  .card:hover { border-color: var(--accent); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .app-name { font-weight: 600; font-size: 1rem; color: var(--accent); text-decoration: none; }
  .app-name:hover { text-decoration: underline; }
  .app-name.no-link { cursor: default; }
  .app-name.no-link:hover { text-decoration: none; }
  .version { background: #1f6feb33; color: var(--accent); padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
  .category { color: var(--muted); font-size: 0.75rem; margin-bottom: 8px; }
  .meta { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .meta-item { font-size: 0.75rem; color: var(--muted); }
  .freshness { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .fresh-active { background: var(--green); }
  .fresh-recent { background: var(--yellow); }
  .fresh-stale { background: var(--red); }
  .fresh-archived { background: var(--muted); }
  .commits { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px; }
  .commit { display: flex; gap: 8px; padding: 3px 0; font-size: 0.75rem; align-items: baseline; }
  .commit-hash { color: var(--purple); font-family: monospace; flex-shrink: 0; }
  .commit-date { color: var(--muted); flex-shrink: 0; min-width: 80px; }
  .commit-msg { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .timeline { margin: 24px 0; }
  .timeline h2 { font-size: 1.1rem; margin-bottom: 12px; }
  .timeline-chart { display: flex; gap: 2px; align-items: end; height: 80px; padding: 8px 0; overflow-x: auto; }
  .timeline-bar { min-width: 6px; flex: 1; background: var(--accent); border-radius: 2px 2px 0 0; cursor: pointer; position: relative; transition: opacity 0.2s; }
  .timeline-bar:hover { opacity: 0.7; }
  .timeline-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--muted); }
  .tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; white-space: nowrap; z-index: 10; }
  .timeline-bar:hover .tooltip { display: block; }
  .sort-controls { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .sort-controls label { font-size: 0.8rem; color: var(--muted); }
  .sort-controls select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; }
  .legend { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.75rem; color: var(--muted); }
</style>
</head>
<body>

<h1>dev-apps Dashboard</h1>
<p class="subtitle">全アプリのアップデート状況 &mdash; 最終更新: 2026-04-13</p>

<div class="stats-bar" id="stats"></div>

<div class="legend">
  <div class="legend-item"><span class="freshness fresh-active"></span> Active (30日以内)</div>
  <div class="legend-item"><span class="freshness fresh-recent"></span> Recent (90日以内)</div>
  <div class="legend-item"><span class="freshness fresh-stale"></span> Stale (1年以内)</div>
  <div class="legend-item"><span class="freshness fresh-archived"></span> Archived (1年以上)</div>
</div>

<div class="timeline">
  <h2>Activity Timeline (直近12ヶ月)</h2>
  <div class="timeline-chart" id="timeline"></div>
  <div class="timeline-labels" id="timeline-labels"></div>
</div>

<input type="text" class="search" id="search" placeholder="アプリ名で検索...">
<div class="filters" id="filters"></div>
<div class="sort-controls">
  <label>並び替え:</label>
  <select id="sort">
    <option value="updated">最終更新日</option>
    <option value="name">名前</option>
    <option value="category">カテゴリ</option>
  </select>
</div>

<div class="grid" id="grid"></div>

const NOW = new Date('2026-04-13');

function daysSince(dateStr) {
  return Math.floor((NOW - new Date(dateStr)) / 86400000);
}

function freshnessClass(days) {
  if (days <= 30) return 'fresh-active';
  if (days <= 90) return 'fresh-recent';
  if (days <= 365) return 'fresh-stale';
  return 'fresh-archived';
}

function freshnessLabel(days) {
  if (days <= 30) return 'Active';
  if (days <= 90) return 'Recent';
  if (days <= 365) return 'Stale';
  return 'Archived';
}

// Stats
const categories = [...new Set(apps.map(a => a.cat))];
const active = apps.filter(a => a.commits[0] && daysSince(a.commits[0].d) <= 30).length;
const recent = apps.filter(a => a.commits[0] && daysSince(a.commits[0].d) > 30 && daysSince(a.commits[0].d) <= 90).length;
const stale = apps.filter(a => a.commits[0] && daysSince(a.commits[0].d) > 90 && daysSince(a.commits[0].d) <= 365).length;
const archived = apps.length - active - recent - stale;

document.getElementById('stats').innerHTML = `
  <div class="stat"><div class="stat-value">${apps.length}</div><div class="stat-label">Total Repos</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--green)">${active}</div><div class="stat-label">Active (30日以内)</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--yellow)">${recent}</div><div class="stat-label">Recent (90日以内)</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--red)">${stale}</div><div class="stat-label">Stale (1年以内)</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--muted)">${archived}</div><div class="stat-label">Archived</div></div>
`;

// Timeline (12 months)
const months = [];
for (let i = 11; i >= 0; i--) {
  const d = new Date(NOW);
  d.setMonth(d.getMonth() - i);
  months.push({year: d.getFullYear(), month: d.getMonth(), label: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`});
}
const monthlyCounts = months.map(m => {
  let count = 0;
  apps.forEach(a => a.commits.forEach(c => {
    const cd = new Date(c.d);
    if (cd.getFullYear() === m.year && cd.getMonth() === m.month) count++;
  }));
  return {label: m.label, count};
});
const maxCount = Math.max(...monthlyCounts.map(m => m.count), 1);
document.getElementById('timeline').innerHTML = monthlyCounts.map(m =>
  `<div class="timeline-bar" style="height:${Math.max((m.count/maxCount)*100,4)}%"><div class="tooltip">${m.label}: ${m.count} commits</div></div>`
).join('');
document.getElementById('timeline-labels').innerHTML = monthlyCounts.map(m =>
  `<span>${m.label.slice(5)}</span>`
).join('');

// Filters
document.getElementById('filters').innerHTML = `<button class="filter-btn active" data-cat="all">All</button>` +
  categories.map(c => `<button class="filter-btn" data-cat="${c}">${c}</button>`).join('');

let currentCat = 'all';
let currentSearch = '';
let currentSort = 'updated';

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentCat = e.target.dataset.cat;
  render();
});

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase();
  render();
});

document.getElementById('sort').addEventListener('change', e => {
  currentSort = e.target.value;
  render();
});

function render() {
  let filtered = apps.filter(a => {
    if (currentCat !== 'all' && a.cat !== currentCat) return false;
    if (currentSearch && !a.name.toLowerCase().includes(currentSearch)) return false;
    return true;
  });

  filtered.sort((a, b) => {
    if (currentSort === 'updated') {
      const da = a.commits[0] ? new Date(a.commits[0].d) : new Date(0);
      const db = b.commits[0] ? new Date(b.commits[0].d) : new Date(0);
      return db - da;
    }
    if (currentSort === 'name') return a.name.localeCompare(b.name);
    if (currentSort === 'category') return a.cat.localeCompare(b.cat) || a.name.localeCompare(b.name);
  });

  document.getElementById('grid').innerHTML = filtered.map(a => {
    const lastDate = a.commits[0] ? a.commits[0].d : 'N/A';
    const days = a.commits[0] ? daysSince(a.commits[0].d) : 9999;
    const fc = freshnessClass(days);
    const fl = freshnessLabel(days);
    const nameHtml = a.remote
      ? `<a class="app-name" href="${a.remote}" target="_blank">${a.name}</a>`
      : `<span class="app-name no-link">${a.name}</span>`;
    const verHtml = a.ver ? `<span class="version">v${a.ver}</span>` : '';
    const tagsHtml = a.tags ? `<div class="meta-item">Tags: ${a.tags.slice(0,3).join(', ')}</div>` : '';

    return `<div class="card" data-cat="${a.cat}">
      <div class="card-header">${nameHtml}${verHtml}</div>
      <div class="category">${a.cat}</div>
      <div class="meta">
        <div class="meta-item"><span class="freshness ${fc}"></span>${fl} &mdash; ${days === 9999 ? 'No commits' : days + '日前'}</div>
        <div class="meta-item">Last: ${lastDate}</div>
        ${tagsHtml}
      </div>
      <div class="commits">
        ${a.commits.slice(0,5).map(c => `<div class="commit">
          <span class="commit-hash">${c.h}</span>
          <span class="commit-date">${c.d}</span>
          <span class="commit-msg">${c.m}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
